{% extends 'base/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="mb-4 text-center fw-bold">Register Book to Ledger</h3>
            <form method="POST" class="action-form">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <div class="d-flex gap-2 mt-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-light rounded-pill border w-50">Cancel</a>
                    <button type="submit" class="btn btn-success rounded-pill w-50">Save Book Asset</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
