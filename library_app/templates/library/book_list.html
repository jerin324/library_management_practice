{% extends "base/base.html" %}
{% block content %}
    
<!DOCTYPE html>
<html>
<head>
    <title>Book List</title>
</head>
<body>
    <h1>All Books</h1>
    <ul>
        {% for book in books %}
            <li>
                {{ book.title }} by {{ book.author }}
                <a href="{% url 'edit-book' book.pk %}">Edit</a>
                <a href="{% url 'delete-book' book.pk %}">Delete</a>
            </li>
        {% empty %}
            <li>No books available.</li>
        {% endfor %}
    </ul>
    <a href="{% url 'add-book' %}">Add New Book</a>
</body>
</html>

{% endblock %}
