{% extends 'base/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border border-danger-subtle p-4 text-center shadow-sm">
            <h3 class="text-danger fw-bold mb-3">⚠️ Delete Confirmation</h3>
            <p class="text-muted">
                Are you sure you want to delete <strong>"{{ book.title }}"</strong> (ISBN: <code>{{ book.isbn }}</code>)? This operational transaction cannot be undone.
            </p>
            <form method="POST" class="m-0 action-form">
                {% csrf_token %}
                <div class="d-flex gap-2 mt-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-light rounded-pill border w-50">Cancel Action</a>
                    <button type="submit" class="btn btn-danger rounded-pill w-50">Confirm Deletion</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
