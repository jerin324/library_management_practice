{% extends 'base/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="text-center fw-bold mb-4">Registration Terminal</h3>
            <form method="POST" novalidate class="action-form">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3" id="div_{{ field.id_for_label }}">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-3">Register Credentials</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
